<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulários</title>
    <!-- Latest compiled and minified CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
    <header class="bg-black text-white text-center align-items-center d-flex justify-content-center"
        style="height: 200px;">
        <h1>Formulário de informação</h1>
        
    </header>

    <main>
        <section class="d-flex justify-content-center align-items-center mt-3">
            <form class="d-flex flex-column w-50 border rounded p-3">
                <h2>Cadastro de usuário</h2>
                <label for="nome">Nome:</label>
                <input class="form-control" id="nome" type="text">
                <label  for="nasc">Data de Nasc.:</label>
                <input  class="form-control" id="nasc" type="date" max="22/05/2023">
                <label for="curso">Quantos artistas pretende ver?</label>
                <input  class="form-control" id="curso" type="number" max="3" min="0">

                
                <label for="">Qual artista você mais gostou?</label>
                <div>
                    <input type="radio" id="html" name="fav_language" value="HTML">
                    <label for="html">ASTRIX</label>
                </div>

                <div>
                    <input type="radio" id="css" name="fav_language" value="CSS">
                    <label for="css">ACE VENTURA</label>
                </div>
                <div>
                    <input type="radio" id="javascript" name="fav_language" value="JavaScript">
                    <label for="javascript">TRISTAN</label>
                </div>

                <label for="model">Selecione a modalidade:</label>
                <select id="model" name="cars">
                    <option value="volvo">PSYTRANCE</option>
                    <option value="saab" disabled>TRANCE</option>
                    <option value="fiat">PSYTRANCE</option>
                </select>

                <input class="mt-2 btn btn-primary" type="submit" value="Salvar">
                <h1 class="text-center">
                    <a href="/index.html" class="btn btn-primary">Voltar</a>
                </h1>
            </form>
        
        </section>
